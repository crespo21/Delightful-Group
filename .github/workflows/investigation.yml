name: Repository Investigation & Issue Discovery

on:
  workflow_dispatch:
    inputs:
      create_issues:
        description: 'Create GitHub Issues for findings'
        required: false
        default: 'true'
        type: boolean
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  investigate:
    name: Automated Repository Investigation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint analysis
        id: lint
        run: |
          npm run lint -- --format json --output-file /tmp/lint-results.json || true
          echo "lint_exit=$?" >> $GITHUB_OUTPUT
          # Also run in human-readable form for the report
          npm run lint 2>&1 | tee /tmp/lint-report.txt || true

      - name: Run build analysis
        id: build
        run: |
          npm run build 2>&1 | tee /tmp/build-report.txt
          echo "build_exit=$?" >> $GITHUB_OUTPUT

      - name: Run investigation script
        id: investigate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          CREATE_ISSUES: ${{ github.event.inputs.create_issues || 'true' }}
        run: node scripts/investigate.js

      - name: Upload investigation report
        uses: actions/upload-artifact@v4
        with:
          name: investigation-report
          path: /tmp/investigation-report.md
          retention-days: 30
